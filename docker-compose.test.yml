services:
  test-db:
    image: postgres:17.5
    container_name: flowspace_test_db
    restart: always
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: flowspace_test
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data

  test-api:
    build: .
    container_name: flowspace_test_api
    depends_on:
      - test-db
    env_file:
      - .env.test
    volumes:
      - .:/app
    command: sh -c "pip install -r requirements-dev.txt && pytest -q"

volumes:
  postgres_test_data:
