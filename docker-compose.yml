services:
  db:
    image: postgres:17.5
    container_name: flowspace_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: flowspace
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: flowspace_api
    restart: always
    command: python -m backend.run
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - .:/app
      - ${FILES_HOST_DIR:-./.docker-data/files}:${FILES_DIR:-/data/files}

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: flowspace_frontend
    restart: always
    env_file:
      - .env
    ports:
      - "5173:5173"
    depends_on:
      - api

  # test_all:
