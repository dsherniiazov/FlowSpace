services:
  db:
    image: postgres:17.5
    container_name: flowspace_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: flowspace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: flowspace_api
    restart: always
    command: python run.py
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    depends_on:
      - db
    volumes:
      - .:/app

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: flowspace_frontend
    restart: always
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_ADMIN_EMAILS: admin@example.com
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres_data:
